
version: '3.9'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: znoc
      POSTGRES_PASSWORD: znoc
      POSTGRES_DB: znoc
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  nats:
    image: nats:2
    command: ["-js"]
    ports:
      - "4222:4222"

  api:
    build: ./apps/api
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - nats
