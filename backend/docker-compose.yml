
version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: znoc
      POSTGRES_PASSWORD: znoc
      POSTGRES_DB: znoc
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
